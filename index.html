<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stockz · AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2228;
      --muted:     #3a404a;
      --text:      #d8dde6;
      --text-dim:  #6b7280;
      --accent:    #00e5a0;
      --accent-2:  #00b4ff;
      --danger:    #ff4d6d;
      --user-bg:   #131a14;
      --agent-bg:  #0f1620;
      --radius:    14px;
      --mono: 'DM Mono', monospace;
      --serif: 'Fraunces', Georgia, serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Layout ── */
    #app {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header-text h1 {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
      letter-spacing: 0.04em;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 100px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.error { background: var(--danger); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, #1a2e1a, #253525);
      border: 1px solid #2e4a2e;
      color: var(--accent);
    }

    .msg.agent .avatar {
      background: linear-gradient(135deg, #0f1f30, #152840);
      border: 1px solid #1e3a56;
      color: var(--accent-2);
    }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 13.5px;
      position: relative;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2a3f2a;
      color: #c8e6c9;
      border-bottom-right-radius: 4px;
    }

    .msg.agent .bubble {
      background: var(--agent-bg);
      border: 1px solid #1a2d42;
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .bubble-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--accent-2);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* tool call chips */
    .tool-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0c1a0c;
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--accent);
      margin: 4px 0;
    }

    .tool-chip.running { color: #ffb300; border-color: #3a2d00; background: #1a1400; }
    .tool-chip.done    { color: var(--accent); }

    /* thinking indicator */
    .thinking {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      animation: fadeUp 0.2s ease forwards;
      opacity: 0;
    }

    .dots span {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--text-dim);
      border-radius: 50%;
      margin: 0 1px;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #1a0a0e;
      border: 1px solid #4d1a26;
      color: #ff8fa3;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    /* ── Input area ── */
    #input-area {
      padding: 12px 0 20px;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    #input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,160,0.08);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13.5px;
      resize: none;
      max-height: 160px;
      min-height: 22px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
      font-size: 16px;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #send-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .hint {
      margin-top: 8px;
      font-size: 10.5px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
      pointer-events: none;
    }

    #empty-state .big-icon { font-size: 40px; opacity: 0.5; }
    #empty-state h2 { font-family: var(--serif); font-size: 22px; color: #fff; opacity: 0.6; font-weight: 300; }
    #empty-state p { font-size: 12px; max-width: 320px; text-align: center; line-height: 1.7; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">📈</div>
    <div class="header-text">
      <h1>Stockz</h1>
      <p>AI-powered financial agent</p>
    </div>
    <div class="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">ready</span>
    </div>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="big-icon">📊</div>
      <h2>Ask me anything</h2>
      <p>Stock prices, market analysis, portfolio questions — I'm connected to live data and code execution.</p>
    </div>
  </div>

  <div id="error-banner"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Ask about stocks, markets, or financials…"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="hint">Shift+Enter for new line · Enter to send</p>
  </div>
</div>

<script>
// ── Configuration ──────────────────────────────────────────────
const AGENT_URL = "http://127.0.0.1:8888/";

// ── State ──────────────────────────────────────────────────────
let conversationHistory = [];
let isStreaming = false;
let runId = null;
let agentMsgEl = null;
let agentTextContent = "";
let thinkingEl = null;
let activeToolChips = {};

// ── DOM refs ──────────────────────────────────────────────────
const messagesEl  = document.getElementById("messages");
const inputEl     = document.getElementById("user-input");
const sendBtn     = document.getElementById("send-btn");
const statusDot   = document.getElementById("status-dot");
const statusText  = document.getElementById("status-text");
const errorBanner = document.getElementById("error-banner");
const emptyState  = document.getElementById("empty-state");

// ── Helpers ───────────────────────────────────────────────────
function setStatus(state) {
  statusDot.className = "status-dot " + (state === "live" ? "live" : state === "error" ? "error" : "");
  statusText.textContent = { live: "streaming", error: "error", ready: "ready", thinking: "thinking…" }[state] || state;
}

function showError(msg) {
  errorBanner.textContent = "⚠ " + msg;
  errorBanner.style.display = "block";
  setTimeout(() => errorBanner.style.display = "none", 6000);
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
}

function timestamp() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function hideEmpty() {
  if (emptyState) { emptyState.style.display = "none"; }
}

// ── Render user bubble ─────────────────────────────────────────
function appendUserMessage(text) {
  hideEmpty();
  const msg = document.createElement("div");
  msg.className = "msg user";
  msg.innerHTML = `
    <div class="avatar">▲</div>
    <div>
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="bubble-meta" style="text-align:right">${timestamp()}</div>
    </div>`;
  messagesEl.appendChild(msg);
  scrollToBottom();
}

// ── Render/create agent bubble ─────────────────────────────────
function createAgentBubble() {
  hideEmpty();
  const msg = document.createElement("div");
  msg.className = "msg agent";
  msg.innerHTML = `
    <div class="avatar">◆</div>
    <div style="max-width:82%">
      <div class="bubble" id="agent-bubble-content"></div>
      <div class="bubble-meta" id="agent-bubble-meta"></div>
    </div>`;
  messagesEl.appendChild(msg);
  agentMsgEl = msg.querySelector("#agent-bubble-content");
  scrollToBottom();
  return msg;
}

function ensureAgentBubble() {
  if (!agentMsgEl) createAgentBubble();
}

function appendToAgent(text) {
  ensureAgentBubble();
  // Remove old cursor
  const oldCursor = agentMsgEl.querySelector(".cursor");
  if (oldCursor) oldCursor.remove();
  agentTextContent += text;
  agentMsgEl.textContent = agentTextContent;
  // Add cursor
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  agentMsgEl.appendChild(cursor);
  scrollToBottom();
}

function finalizeAgentBubble() {
  if (!agentMsgEl) return;
  const cursor = agentMsgEl.querySelector(".cursor");
  if (cursor) cursor.remove();
  const meta = document.getElementById("agent-bubble-meta");
  if (meta) meta.textContent = timestamp();
  agentMsgEl = null;
  agentTextContent = "";
}

// ── Thinking indicator ─────────────────────────────────────────
function showThinking() {
  thinkingEl = document.createElement("div");
  thinkingEl.className = "thinking";
  thinkingEl.innerHTML = `<div class="dots"><span></span><span></span><span></span></div><span>Agent is thinking…</span>`;
  messagesEl.appendChild(thinkingEl);
  scrollToBottom();
}

function hideThinking() {
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}

// ── Tool chip ─────────────────────────────────────────────────
function showToolChip(toolCallId, toolName) {
  ensureAgentBubble();
  const cursor = agentMsgEl.querySelector(".cursor");
  const chip = document.createElement("div");
  chip.className = "tool-chip running";
  chip.id = "tool-" + toolCallId;
  chip.innerHTML = `⚙ ${escapeHtml(toolName)} <span style="opacity:0.5">running…</span>`;
  if (cursor) agentMsgEl.insertBefore(chip, cursor);
  else agentMsgEl.appendChild(chip);
  activeToolChips[toolCallId] = chip;
  scrollToBottom();
}

function resolveToolChip(toolCallId) {
  const chip = activeToolChips[toolCallId];
  if (chip) {
    chip.className = "tool-chip done";
    chip.innerHTML = `✓ ${chip.innerHTML.split('<span')[0].replace('⚙ ', '')} <span style="opacity:0.5">done</span>`;
    delete activeToolChips[toolCallId];
  }
}

// ── HTML escape ───────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── AG-UI SSE event handler ────────────────────────────────────
// AG-UI sends newline-delimited JSON events over SSE.
// Event types: RUN_STARTED, TEXT_MESSAGE_START, TEXT_MESSAGE_CONTENT,
//              TEXT_MESSAGE_END, TOOL_CALL_START, TOOL_CALL_END,
//              RUN_FINISHED, RUN_ERROR, etc.
function handleAGUIEvent(event) {
  const type = event.type;

  if (type === "RUN_STARTED") {
    runId = event.runId;
    hideThinking();
    setStatus("live");
  }
  else if (type === "TEXT_MESSAGE_START") {
    // New agent message starting
    if (!agentMsgEl) createAgentBubble();
  }
  else if (type === "TEXT_MESSAGE_CONTENT") {
    appendToAgent(event.delta || "");
  }
  else if (type === "TEXT_MESSAGE_END") {
    // message complete - do nothing yet, wait for RUN_FINISHED
  }
  else if (type === "TOOL_CALL_START") {
    showToolChip(event.toolCallId, event.toolCallName || "tool");
  }
  else if (type === "TOOL_CALL_END") {
    resolveToolChip(event.toolCallId);
  }
  else if (type === "RUN_FINISHED") {
    finalizeAgentBubble();
    // Capture assistant response for conversation history
    const msgText = agentTextContent; // already cleared by finalizeAgentBubble - captured before
    conversationHistory.push({ role: "assistant", content: event.message || "" });
    setStatus("ready");
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
  }
  else if (type === "RUN_ERROR") {
    hideThinking();
    finalizeAgentBubble();
    showError(event.message || "Agent run error");
    setStatus("error");
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
  }
}

// ── Send message via AG-UI (SSE streaming POST) ───────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  agentMsgEl = null;
  agentTextContent = "";
  activeToolChips = {};
  errorBanner.style.display = "none";

  // Update UI
  appendUserMessage(text);
  conversationHistory.push({ role: "user", content: text });
  inputEl.value = "";
  autoResize();
  sendBtn.disabled = true;
  inputEl.disabled = true;
  showThinking();
  setStatus("thinking");

  // Build AG-UI RunAgentInput payload
  const payload = {
    runId: crypto.randomUUID(),
    messages: conversationHistory.map(m => ({
      id: crypto.randomUUID(),
      role: m.role,
      content: m.content,
    })),
  };

  try {
    const response = await fetch(AGENT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "text/event-stream",
      },
      body: JSON.stringify(payload),
    });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}: ${response.statusText}`);
    }

    // Read SSE stream
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let lastAssistantText = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // SSE: split on double newline (event boundaries)
      const parts = buffer.split("\n\n");
      buffer = parts.pop(); // keep incomplete part

      for (const part of parts) {
        const lines = part.split("\n");
        let eventData = "";
        for (const line of lines) {
          if (line.startsWith("data:")) {
            eventData += line.slice(5).trim();
          }
        }
        if (!eventData || eventData === "[DONE]") continue;
        try {
          const event = JSON.parse(eventData);
          // Track last text for conversation history
          if (event.type === "TEXT_MESSAGE_CONTENT") {
            lastAssistantText += event.delta || "";
          }
          if (event.type === "RUN_FINISHED") {
            event.message = lastAssistantText;
          }
          handleAGUIEvent(event);
        } catch (e) {
          // ignore parse errors on incomplete chunks
        }
      }
    }

    // Handle any remaining buffer
    if (buffer.trim()) {
      try {
        const lines = buffer.split("\n");
        let eventData = "";
        for (const line of lines) {
          if (line.startsWith("data:")) eventData += line.slice(5).trim();
        }
        if (eventData && eventData !== "[DONE]") {
          const event = JSON.parse(eventData);
          handleAGUIEvent(event);
        }
      } catch (e) { /* ignore */ }
    }

    // Ensure we finalize if stream ended without RUN_FINISHED
    if (isStreaming) {
      finalizeAgentBubble();
      setStatus("ready");
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
    }

  } catch (err) {
    hideThinking();
    finalizeAgentBubble();
    showError(err.message || "Failed to connect to agent");
    setStatus("error");
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
  }
}

// ── Event listeners ───────────────────────────────────────────
sendBtn.addEventListener("click", sendMessage);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener("input", autoResize);

// Initial focus
inputEl.focus();
</script>
</body>
</html>
